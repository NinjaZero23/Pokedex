<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pokédex completa con información de todos los Pokémon: stats, habilidades, evoluciones, debilidades y más." />
  <meta name="theme-color" content="#080c10" />
  <title>Pokédex</title>

  <!-- Favicon: pokébola SVG inline como data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23ff4d6d' stroke='%23222' stroke-width='4'/><rect x='2' y='46' width='96' height='8' fill='%23222'/><circle cx='50' cy='50' r='14' fill='white' stroke='%23222' stroke-width='4'/><circle cx='50' cy='50' r='7' fill='%23080c10'/></svg>" />

  <!-- Fuentes de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">

  <!-- Nuestros estilos -->
  <link rel="stylesheet" href="style.css" />

  <!-- Protección de ruta: si no hay sesión redirige a login.html ANTES de renderizar -->
  <script src="session.js"></script>
</head>
<body>

  <!-- ==============================
       BARRA SUPERIOR (HEADER)
       ============================== -->
  <header id="header">

    <div id="logo">
      <div id="logo-icon"></div>
      <span id="logo-text">POKÉDEX</span>
    </div>

    <div class="hdivider"></div>

    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar por nombre o #..." autocomplete="off" />
    </div>

    <select id="gen-select">
      <option value="1,905">Todos</option>
      <option value="1,151">Gen I (Kanto)</option>
      <option value="152,251">Gen II (Johto)</option>
      <option value="252,386">Gen III (Hoenn)</option>
      <option value="387,493">Gen IV (Sinnoh)</option>
      <option value="494,649">Gen V (Unova)</option>
      <option value="650,721">Gen VI (Kalos)</option>
      <option value="722,809">Gen VII (Alola)</option>
      <option value="810,905">Gen VIII (Galar)</option>
    </select>

    <span id="pokemon-count"></span>

    <div class="hdivider"></div>

    <!-- Usuario con sesión activa -->
    <div id="user-menu">
      <div id="user-avatar"></div>
      <span id="user-name"></span>
      <button id="btn-logout" title="Cerrar sesión">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

  </header>


  <!-- ==============================
       BARRA DE FILTROS POR TIPO
       ============================== -->
  <div id="type-bar">
    <button class="type-chip active" data-type="all">todos</button>
  </div>


  <!-- ==============================
       CONTENIDO PRINCIPAL
       ============================== -->
  <main id="main">

    <section id="grid-section">
      <div id="pokemon-grid">

        <div id="loader">
          <div class="pokeball"></div>
          <span>Cargando Pokémon...</span>
        </div>

        <div id="no-results">
          <div class="nr-icon">?</div>
          <p>Ningún Pokémon coincide con tu búsqueda.</p>
        </div>

      </div>
    </section>

    <aside id="detail-panel">

      <div id="detail-empty">
        <div class="empty-ball"></div>
        <p>Selecciona un Pokémon<br>para ver sus detalles</p>
      </div>

      <div id="detail-content" style="display:none"></div>

    </aside>

  </main>

  <!-- ==============================
       BARRA DE EQUIPO
       Fija en la parte inferior de la pantalla
       ============================== -->
  <div id="team-bar">
    <div id="team-bar-inner">
      <div id="team-bar-header">
        <span id="team-bar-title">
          <span class="team-bar-icon">◈</span>
          Mi equipo
        </span>
        <span id="team-count">0 / 6</span>
        <button id="btn-clear-team" title="Vaciar equipo">Limpiar</button>
      </div>
      <div id="team-slots"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="team.js"></script>

</body>
</html>
