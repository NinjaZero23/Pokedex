<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Inicia sesión o regístrate en la Pokédex." />
  <meta name="theme-color" content="#080c10" />
  <title>Pokédex — Acceder</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23ff4d6d' stroke='%23222' stroke-width='4'/><rect x='2' y='46' width='96' height='8' fill='%23222'/><circle cx='50' cy='50' r='14' fill='white' stroke='%23222' stroke-width='4'/><circle cx='50' cy='50' r='7' fill='%23080c10'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <!-- Fondo con partículas decorativas -->
  <div class="auth-bg">
    <div class="auth-bg-blob auth-bg-blob--1"></div>
    <div class="auth-bg-blob auth-bg-blob--2"></div>
    <div class="auth-bg-blob auth-bg-blob--3"></div>
  </div>

  <!-- Contenedor central -->
  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon"></div>
      <span class="auth-logo-text">POKÉDEX</span>
    </div>

    <!-- Tarjeta -->
    <div class="auth-card">

      <!-- Tabs Login / Registro -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Registrarse</button>
      </div>

      <!-- Mensaje de error/éxito -->
      <div id="auth-message" class="auth-message" style="display:none"></div>

      <!-- ── FORMULARIO LOGIN ── -->
      <div id="tab-login" class="auth-form">
        <div class="auth-field">
          <label class="auth-label" for="login-email">Correo electrónico</label>
          <input class="auth-input" type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="login-password">Contraseña</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
            <button class="auth-eye" data-target="login-password" title="Mostrar contraseña">
              <svg id="eye-login-show" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-login-hide" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button class="auth-btn" id="btn-login">Entrar</button>
      </div>

      <!-- ── FORMULARIO REGISTRO ── -->
      <div id="tab-register" class="auth-form" style="display:none">
        <div class="auth-field">
          <label class="auth-label" for="reg-name">Nombre de entrenador</label>
          <input class="auth-input" type="text" id="reg-name" placeholder="Ash Ketchum" autocomplete="username" />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="reg-email">Correo electrónico</label>
          <input class="auth-input" type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="reg-password">Contraseña</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button class="auth-eye" data-target="reg-password" title="Mostrar contraseña">
              <svg id="eye-reg-show" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-reg-hide" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="reg-confirm">Confirmar contraseña</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="reg-confirm" placeholder="Repite la contraseña" autocomplete="new-password" />
            <button class="auth-eye" data-target="reg-confirm" title="Mostrar contraseña">
              <svg id="eye-reg-confirm-show" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-reg-confirm-hide" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button class="auth-btn" id="btn-register">Crear cuenta</button>
      </div>

    </div>

    <p class="auth-footer">Tus datos se guardan solo en este navegador.</p>

  </div>

  <script src="auth.js"></script>
</body>
</html>
